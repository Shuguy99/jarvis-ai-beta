<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050a12"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="256" height="256" rx="0" fill="url(#bg)"/>

  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.15"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9" filter="url(#glow)"/>

  <!-- Outer ring tick marks (8 segments) -->
  <g stroke="#00e5ff" stroke-width="2" opacity="0.7" filter="url(#glow)">
    <line x1="128" y1="38" x2="128" y2="48"/>
    <line x1="128" y1="208" x2="128" y2="218"/>
    <line x1="38" y1="128" x2="48" y2="128"/>
    <line x1="208" y1="128" x2="218" y2="128"/>
    <line x1="64.3" y1="64.3" x2="71.4" y2="71.4"/>
    <line x1="191.7" y1="191.7" x2="184.6" y2="184.6"/>
    <line x1="191.7" y1="64.3" x2="184.6" y2="71.4"/>
    <line x1="64.3" y1="191.7" x2="71.4" y2="184.6"/>
  </g>

  <!-- Middle ring (dashed) -->
  <circle cx="128" cy="128" r="68" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.6" stroke-dasharray="8 6" filter="url(#glow)"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="48" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>

  <!-- Inner detail ring -->
  <circle cx="128" cy="128" r="30" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>

  <!-- Core glow -->
  <circle cx="128" cy="128" r="24" fill="url(#coreGlow)" filter="url(#glowStrong)"/>

  <!-- Core dot -->
  <circle cx="128" cy="128" r="10" fill="#00e5ff" opacity="1" filter="url(#glowStrong)"/>
  <circle cx="128" cy="128" r="5" fill="#ffffff" opacity="0.9"/>

  <!-- Arc segments on middle ring -->
  <g fill="none" stroke="#00e5ff" stroke-width="3" opacity="0.5" filter="url(#glow)">
    <path d="M 128 60 A 68 68 0 0 1 196 128"/>
    <path d="M 128 196 A 68 68 0 0 1 60 128"/>
  </g>
</svg>